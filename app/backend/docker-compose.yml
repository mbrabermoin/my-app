version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: backend_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: appdb
    ports:
      # map to a different host port if 5432 is already used by a local Postgres
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
